name: bezrealitky-scraper

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7,15,23 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DB_DSN: ${{ secrets.DB_DSN }}
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
      NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
      NTFY_BASE_URL: ${{ vars.NTFY_BASE_URL }}
      BZR_CITY: ${{ vars.BZR_CITY }}
      BZR_OFFER: ${{ vars.BZR_OFFER }}
      BZR_ESTATE_TYPES: ${{ vars.BZR_ESTATE_TYPES }}
      BZR_WORKERS: ${{ vars.BZR_WORKERS }}
      BZR_DELAY: ${{ vars.BZR_DELAY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python scraper.py \
            --city "${BZR_CITY:-Hostivice}" \
            --offer "${BZR_OFFER:-pronajem}" \
            --estate-types ${BZR_ESTATE_TYPES:-bytu domu} \
            --workers "${BZR_WORKERS:-4}" \
            --delay "${BZR_DELAY:-0.0}" \
            --out-dir output

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-output
          path: output/
          if-no-files-found: ignore
